<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="#6F4278" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Outer circle -->
  <circle cx="32" cy="32" r="26"/>
  <!-- Inner circle -->
  <circle cx="32" cy="32" r="18"/>
  <!-- Cardinal direction ticks -->
  <line x1="32" y1="6" x2="32" y2="10"/>
  <line x1="32" y1="54" x2="32" y2="58"/>
  <line x1="6" y1="32" x2="10" y2="32"/>
  <line x1="54" y1="32" x2="58" y2="32"/>
  <!-- Compass needle - North pointer -->
  <polygon points="32,14 28,34 32,30 36,34" stroke="#6F4278" stroke-width="2"/>
  <!-- South pointer -->
  <polygon points="32,50 28,34 32,38 36,34" stroke="#6F4278" stroke-width="2"/>
  <!-- Small center dot -->
  <circle cx="32" cy="32" r="2"/>
  <!-- Direction letters -->
  <text x="32" y="9" text-anchor="middle" font-size="5" fill="#6F4278" stroke="none" font-family="sans-serif">N</text>
</svg>
