    <!-- 180 deg (bottom) -->
    <path d="M24,31 C27,35 27,41 24,45 C21,41 21,35 24,31Z"/>
    <!-- 240 deg (lower left) -->
    <path d="M17.9,27.5 C15.3,31.9 10.2,34.9 6.1,33.5 C8.7,29.1 13.8,26.1 17.9,27.5Z"/>
