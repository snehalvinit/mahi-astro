<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <g fill="none" stroke="#C9A84C" stroke-width="1.5">
    <!-- Outer circle -->
    <circle cx="200" cy="200" r="190"/>
    <!-- Middle circle (house boundary) -->
    <circle cx="200" cy="200" r="160"/>
    <!-- Inner circle -->
    <circle cx="200" cy="200" r="130"/>
    <!-- Innermost circle -->
    <circle cx="200" cy="200" r="40"/>

    <!-- 12 house dividing lines (every 30 degrees) -->
    <!-- 0 deg (right / Aries cusp) -->
    <line x1="240" y1="200" x2="390" y2="200"/>
    <!-- 30 deg -->
    <line x1="234.6" y1="180" x2="364.5" y2="105"/>
    <!-- 60 deg -->
    <line x1="220" y1="165.4" x2="295" y2="35.5"/>
    <!-- 90 deg (top / MC) -->
    <line x1="200" y1="160" x2="200" y2="10"/>
    <!-- 120 deg -->
    <line x1="180" y1="165.4" x2="105" y2="35.5"/>
    <!-- 150 deg -->
    <line x1="165.4" y1="180" x2="35.5" y2="105"/>
    <!-- 180 deg (left / Libra cusp) -->
    <line x1="160" y1="200" x2="10" y2="200"/>
    <!-- 210 deg -->
    <line x1="165.4" y1="220" x2="35.5" y2="295"/>
    <!-- 240 deg -->
    <line x1="180" y1="234.6" x2="105" y2="364.5"/>
    <!-- 270 deg (bottom / IC) -->
    <line x1="200" y1="240" x2="200" y2="390"/>
    <!-- 300 deg -->
    <line x1="220" y1="234.6" x2="295" y2="364.5"/>
    <!-- 330 deg -->
    <line x1="234.6" y1="220" x2="364.5" y2="295"/>
  </g>

  <!-- House numbers -->
  <g fill="#C9A84C" font-family="serif" font-size="14" text-anchor="middle" dominant-baseline="central">
    <text x="260" y="188">1</text>
    <text x="248" y="155">2</text>
    <text x="218" y="140">3</text>
    <text x="188" y="140">4</text>
    <text x="158" y="155">5</text>
    <text x="145" y="188">6</text>
    <text x="145" y="218">7</text>
    <text x="158" y="248">8</text>
    <text x="188" y="262">9</text>
    <text x="218" y="262">10</text>
    <text x="248" y="248">11</text>
    <text x="260" y="218">12</text>
  </g>

  <!-- Zodiac symbols in the outer ring (between r=160 and r=190) -->
  <g fill="#C9A84C" font-family="serif" font-size="16" text-anchor="middle" dominant-baseline="central">
    <!-- Aries (0-30, midpoint 15 deg from right) -->
    <text x="370" y="176" font-size="13">&#x2648;</text>
    <!-- Taurus -->
    <text x="336" y="103" font-size="13">&#x2649;</text>
    <!-- Gemini -->
    <text x="270" y="50" font-size="13">&#x264A;</text>
    <!-- Cancer -->
    <text x="190" y="30" font-size="13">&#x264B;</text>
    <!-- Leo -->
    <text x="118" y="55" font-size="13">&#x264C;</text>
    <!-- Virgo -->
    <text x="60" y="115" font-size="13">&#x264D;</text>
    <!-- Libra -->
    <text x="32" y="200" font-size="13">&#x264E;</text>
    <!-- Scorpio -->
    <text x="48" y="290" font-size="13">&#x264F;</text>
    <!-- Sagittarius -->
    <text x="110" y="348" font-size="13">&#x2650;</text>
    <!-- Capricorn -->
    <text x="195" y="378" font-size="13">&#x2651;</text>
    <!-- Aquarius -->
    <text x="280" y="355" font-size="13">&#x2652;</text>
    <!-- Pisces -->
    <text x="345" y="295" font-size="13">&#x2653;</text>
  </g>

  <!-- Center decorative element -->
  <g fill="none" stroke="#C9A84C" stroke-width="1">
    <circle cx="200" cy="200" r="8"/>
    <circle cx="200" cy="200" r="3" fill="#C9A84C"/>
    <!-- Small cross at center -->
    <line x1="200" y1="192" x2="200" y2="208"/>
    <line x1="192" y1="200" x2="208" y2="200"/>
  </g>

  <!-- Decorative tick marks on outer circle -->
  <g stroke="#C9A84C" stroke-width="0.8">
    <!-- Small ticks every 10 degrees on outer ring -->
    <line x1="388" y1="200" x2="382" y2="200"/>
    <line x1="386.2" y1="233.1" x2="380.3" y2="231.4"/>
    <line x1="380.9" y1="265.2" x2="375.1" y2="262"/>
