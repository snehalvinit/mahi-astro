    <line x1="61.5" y1="314.5" x2="65.7" y2="310.3"/>
    <line x1="85.5" y1="338.5" x2="89.7" y2="334.3"/>
    <line x1="314.5" y1="338.5" x2="310.3" y2="334.3"/>
  </g>
