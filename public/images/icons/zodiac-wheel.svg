    <line x1="200" y1="12" x2="200" y2="18"/>
    <line x1="166.9" y1="13.8" x2="168.6" y2="19.7"/>
    <line x1="134.8" y1="19.1" x2="138" y2="24.9"/>
    <line x1="107" y1="34.8" x2="111.8" y2="39.9"/>
    <line x1="34.8" y1="107" x2="39.9" y2="111.8"/>
    <line x1="19.1" y1="134.8" x2="24.9" y2="138"/>
    <line x1="13.8" y1="166.9" x2="19.7" y2="168.6"/>
    <line x1="12" y1="200" x2="18" y2="200"/>
    <line x1="13.8" y1="233.1" x2="19.7" y2="231.4"/>
    <line x1="19.1" y1="265.2" x2="24.9" y2="262"/>
    <line x1="34.8" y1="293" x2="39.9" y2="288.2"/>
    <line x1="107" y1="365.2" x2="111.8" y2="360.1"/>
    <line x1="134.8" y1="380.9" x2="138" y2="375.1"/>
    <line x1="166.9" y1="386.2" x2="168.6" y2="380.3"/>
    <line x1="200" y1="388" x2="200" y2="382"/>
    <line x1="233.1" y1="386.2" x2="231.4" y2="380.3"/>
    <line x1="265.2" y1="380.9" x2="262" y2="375.1"/>
    <line x1="293" y1="365.2" x2="288.2" y2="360.1"/>
    <line x1="293" y1="34.8" x2="288.2" y2="39.9"/>
    <line x1="265.2" y1="19.1" x2="262" y2="24.9"/>
    <line x1="265.2" y1="380.9" x2="262" y2="375.1"/>
    <line x1="338.5" y1="85.5" x2="334.3" y2="89.7"/>
    <line x1="338.5" y1="314.5" x2="334.3" y2="310.3"/>
    <line x1="85.5" y1="61.5" x2="89.7" y2="65.7"/>
