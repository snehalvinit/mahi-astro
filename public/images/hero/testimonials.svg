<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" fill="none">
  <defs>
    <linearGradient id="waveGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0"/>
      <stop offset="30%" stop-color="#C9A84C" stop-opacity="0.1"/>
      <stop offset="70%" stop-color="#C9A84C" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="waveGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0"/>
      <stop offset="40%" stop-color="#C9A84C" stop-opacity="0.07"/>
      <stop offset="60%" stop-color="#C9A84C" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Gentle wave patterns -->
  <path d="M0 350 Q150 310 300 340 Q450 370 600 330 Q750 290 900 320 Q1050 350 1200 310" stroke="url(#waveGrad1)" stroke-width="1.2" fill="none"/>
  <path d="M0 380 Q150 340 300 370 Q450 400 600 360 Q750 320 900 350 Q1050 380 1200 340" stroke="url(#waveGrad2)" stroke-width="1" fill="none"/>
  <path d="M0 410 Q150 375 300 400 Q450 425 600 390 Q750 355 900 385 Q1050 415 1200 375" stroke="url(#waveGrad2)" stroke-width="0.8" fill="none"/>

  <!-- Upper wave set -->
  <path d="M0 120 Q150 90 300 110 Q450 130 600 100 Q750 70 900 95 Q1050 120 1200 90" stroke="url(#waveGrad2)" stroke-width="0.8" fill="none"/>
  <path d="M0 145 Q150 115 300 135 Q450 155 600 125 Q750 95 900 120 Q1050 145 1200 115" stroke="url(#waveGrad2)" stroke-width="0.6" fill="none"/>

  <!-- Star accents scattered across -->
  <!-- 4-point stars -->
  <g fill="#C9A84C" fill-opacity="0.18">
    <path d="M150 80 L152 73 L154 80 L152 87Z"/>
    <path d="M400 60 L402 54 L404 60 L402 66Z"/>
    <path d="M700 90 L703 82 L706 90 L703 98Z"/>
    <path d="M950 55 L952 49 L954 55 L952 61Z"/>
    <path d="M1100 85 L1102 79 L1104 85 L1102 91Z"/>
  </g>

  <!-- Small circle stars -->
  <circle cx="80" cy="180" r="1.2" fill="#C9A84C" fill-opacity="0.15"/>
  <circle cx="250" cy="220" r="1.5" fill="#FFFFFF" fill-opacity="0.12"/>
  <circle cx="500" cy="190" r="1" fill="#C9A84C" fill-opacity="0.18"/>
  <circle cx="680" cy="240" r="1.2" fill="#FFFFFF" fill-opacity="0.1"/>
  <circle cx="850" cy="200" r="1.5" fill="#C9A84C" fill-opacity="0.15"/>
  <circle cx="1050" cy="180" r="1" fill="#FFFFFF" fill-opacity="0.12"/>
  <circle cx="180" cy="450" r="1.2" fill="#C9A84C" fill-opacity="0.1"/>
  <circle cx="520" cy="460" r="1" fill="#FFFFFF" fill-opacity="0.1"/>
  <circle cx="780" cy="440" r="1.5" fill="#C9A84C" fill-opacity="0.12"/>
  <circle cx="1000" cy="460" r="1" fill="#FFFFFF" fill-opacity="0.1"/>

  <!-- Larger 4-point star accents in middle area -->
  <g fill="#C9A84C" fill-opacity="0.12">
    <path d="M300 280 L303 268 L306 280 L303 292Z"/>
    <path d="M900 270 L904 256 L908 270 L904 284Z"/>
  </g>

  <!-- Subtle warm glow circles -->
  <circle cx="300" cy="250" r="80" fill="#C9A84C" fill-opacity="0.03"/>
  <circle cx="900" cy="250" r="80" fill="#C9A84C" fill-opacity="0.03"/>
  <circle cx="600" cy="250" r="100" fill="#C9A84C" fill-opacity="0.04"/>
</svg>