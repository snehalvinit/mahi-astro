<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" fill="none">
  <defs>
    <radialGradient id="blogGlow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background glow -->
  <rect width="1200" height="500" fill="url(#blogGlow)"/>

  <!-- Scroll/book shape - left side -->
  <g transform="translate(120, 250)" opacity="0.08" stroke="#C9A84C" fill="none">
    <!-- Open book/scroll shape -->
    <path d="M-60 -80 Q-50 -85 -40 -80 L-40 80 Q-50 85 -60 80Z" stroke-width="0.8"/>
    <path d="M-40 -80 Q0 -95 40 -80 L40 80 Q0 95 -40 80Z" stroke-width="0.8"/>
    <!-- Page lines -->
    <line x1="-30" y1="-60" x2="30" y2="-65" stroke-width="0.4"/>
    <line x1="-30" y1="-40" x2="30" y2="-45" stroke-width="0.4"/>
    <line x1="-30" y1="-20" x2="30" y2="-25" stroke-width="0.4"/>
    <line x1="-30" y1="0" x2="30" y2="-5" stroke-width="0.4"/>
    <line x1="-30" y1="20" x2="30" y2="15" stroke-width="0.4"/>
    <line x1="-30" y1="40" x2="30" y2="35" stroke-width="0.4"/>
    <line x1="-30" y1="60" x2="30" y2="55" stroke-width="0.4"/>
    <!-- Scroll curl -->
    <path d="M-60 -80 Q-70 -75 -68 -65 Q-66 -55 -60 -55" stroke-width="0.6"/>
    <path d="M-60 80 Q-70 75 -68 65 Q-66 55 -60 55" stroke-width="0.6"/>
  </g>

  <!-- Scroll/book shape - right side -->
  <g transform="translate(1080, 250)" opacity="0.08" stroke="#C9A84C" fill="none">
    <path d="M60 -80 Q50 -85 40 -80 L40 80 Q50 85 60 80Z" stroke-width="0.8"/>
    <path d="M40 -80 Q0 -95 -40 -80 L-40 80 Q0 95 40 80Z" stroke-width="0.8"/>
    <line x1="30" y1="-60" x2="-30" y2="-65" stroke-width="0.4"/>
    <line x1="30" y1="-40" x2="-30" y2="-45" stroke-width="0.4"/>
    <line x1="30" y1="-20" x2="-30" y2="-25" stroke-width="0.4"/>
    <line x1="30" y1="0" x2="-30" y2="-5" stroke-width="0.4"/>
    <line x1="30" y1="20" x2="-30" y2="15" stroke-width="0.4"/>
    <line x1="30" y1="40" x2="-30" y2="35" stroke-width="0.4"/>
    <line x1="30" y1="60" x2="-30" y2="55" stroke-width="0.4"/>
    <path d="M60 -80 Q70 -75 68 -65 Q66 -55 60 -55" stroke-width="0.6"/>
    <path d="M60 80 Q70 75 68 65 Q66 55 60 55" stroke-width="0.6"/>
  </g>

  <!-- Star constellation pattern - central area -->
  <g opacity="0.15" fill="#C9A84C">
    <!-- Constellation nodes -->
    <circle cx="380" cy="150" r="2"/>
    <circle cx="450" cy="120" r="1.5"/>
    <circle cx="520" cy="160" r="2.2"/>
    <circle cx="560" cy="110" r="1.8"/>
    <circle cx="620" cy="140" r="2"/>
    <circle cx="680" cy="100" r="1.5"/>
    <circle cx="740" cy="150" r="2"/>
    <circle cx="800" cy="120" r="1.8"/>
    <circle cx="860" cy="155" r="1.5"/>
  </g>
  <!-- Constellation lines -->
  <g opacity="0.08" stroke="#C9A84C" stroke-width="0.6">
    <line x1="380" y1="150" x2="450" y2="120"/>
    <line x1="450" y1="120" x2="520" y2="160"/>
    <line x1="520" y1="160" x2="560" y2="110"/>
    <line x1="560" y1="110" x2="620" y2="140"/>
    <line x1="620" y1="140" x2="680" y2="100"/>
    <line x1="680" y1="100" x2="740" y2="150"/>
    <line x1="740" y1="150" x2="800" y2="120"/>
    <line x1="800" y1="120" x2="860" y2="155"/>
  </g>

  <!-- Second constellation - lower area -->
  <g opacity="0.12" fill="#C9A84C">
    <circle cx="300" cy="350" r="1.8"/>
    <circle cx="380" cy="380" r="1.5"/>
    <circle cx="460" cy="340" r="2"/>
    <circle cx="540" cy="370" r="1.5"/>
    <circle cx="630" cy="350" r="1.8"/>
    <circle cx="720" cy="380" r="2"/>
    <circle cx="800" cy="340" r="1.5"/>
    <circle cx="880" cy="370" r="1.8"/>
  </g>
  <g opacity="0.06" stroke="#C9A84C" stroke-width="0.5">
    <line x1="300" y1="350" x2="380" y2="380"/>
    <line x1="380" y1="380" x2="460" y2="340"/>
    <line x1="460" y1="340" x2="540" y2="370"/>
    <line x1="540" y1="370" x2="630" y2="350"/>
    <line x1="630" y1="350" x2="720" y2="380"/>
    <line x1="720" y1="380" x2="800" y2="340"/>
    <line x1="800" y1="340" x2="880" y2="370"/>
  </g>

  <!-- Additional scattered stars -->
  <circle cx="200" cy="80" r="1" fill="#C9A84C" fill-opacity="0.15"/>
  <circle cx="600" cy="50" r="1.5" fill="#FFFFFF" fill-opacity="0.1"/>
  <circle cx="1000" cy="70" r="1.2" fill="#C9A84C" fill-opacity="0.12"/>
  <circle cx="250" cy="450" r="1" fill="#FFFFFF" fill-opacity="0.1"/>
  <circle cx="600" cy="450" r="1.5" fill="#C9A84C" fill-opacity="0.1"/>
  <circle cx="950" cy="440" r="1" fill="#FFFFFF" fill-opacity="0.1"/>

  <!-- 4-point star accents -->
  <path d="M480 250 L482 244 L484 250 L482 256Z" fill="#C9A84C" fill-opacity="0.15"/>
  <path d="M720 250 L723 242 L726 250 L723 258Z" fill="#C9A84C" fill-opacity="0.15"/>
  <path d="M600 240 L603 230 L606 240 L603 250Z" fill="#C9A84C" fill-opacity="0.12"/>
</svg>