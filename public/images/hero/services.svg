<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" fill="none">
  <defs>
    <radialGradient id="geoGlow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background glow -->
  <rect width="1200" height="500" fill="url(#geoGlow)"/>

  <!-- Central Flower of Life pattern -->
  <g transform="translate(600, 250)" opacity="0.1" stroke="#C9A84C" stroke-width="0.8" fill="none">
    <!-- Center circle -->
    <circle cx="0" cy="0" r="50"/>
    <!-- 6 surrounding circles -->
    <circle cx="50" cy="0" r="50"/>
    <circle cx="-50" cy="0" r="50"/>
    <circle cx="25" cy="43.3" r="50"/>
    <circle cx="-25" cy="43.3" r="50"/>
    <circle cx="25" cy="-43.3" r="50"/>
    <circle cx="-25" cy="-43.3" r="50"/>
    <!-- Outer ring of circles -->
    <circle cx="100" cy="0" r="50"/>
    <circle cx="-100" cy="0" r="50"/>
    <circle cx="75" cy="43.3" r="50"/>
    <circle cx="-75" cy="43.3" r="50"/>
    <circle cx="75" cy="-43.3" r="50"/>
    <circle cx="-75" cy="-43.3" r="50"/>
    <circle cx="50" cy="86.6" r="50"/>
    <circle cx="-50" cy="86.6" r="50"/>
    <circle cx="50" cy="-86.6" r="50"/>
    <circle cx="-50" cy="-86.6" r="50"/>
    <circle cx="0" cy="86.6" r="50"/>
    <circle cx="0" cy="-86.6" r="50"/>
    <!-- Bounding circle -->
    <circle cx="0" cy="0" r="150"/>
  </g>

  <!-- Left hexagonal pattern -->
  <g transform="translate(180, 250)" opacity="0.08" stroke="#C9A84C" stroke-width="0.7" fill="none">
    <polygon points="0,-60 52,-30 52,30 0,60 -52,30 -52,-30"/>
    <polygon points="0,-40 34.6,-20 34.6,20 0,40 -34.6,20 -34.6,-20"/>
    <polygon points="0,-20 17.3,-10 17.3,10 0,20 -17.3,10 -17.3,-10"/>
    <line x1="0" y1="-60" x2="0" y2="60"/>
    <line x1="-52" y1="-30" x2="52" y2="30"/>
    <line x1="-52" y1="30" x2="52" y2="-30"/>
  </g>

  <!-- Right hexagonal pattern -->
  <g transform="translate(1020, 250)" opacity="0.08" stroke="#C9A84C" stroke-width="0.7" fill="none">
    <polygon points="0,-60 52,-30 52,30 0,60 -52,30 -52,-30"/>
    <polygon points="0,-40 34.6,-20 34.6,20 0,40 -34.6,20 -34.6,-20"/>
    <polygon points="0,-20 17.3,-10 17.3,10 0,20 -17.3,10 -17.3,-10"/>
    <line x1="0" y1="-60" x2="0" y2="60"/>
    <line x1="-52" y1="-30" x2="52" y2="30"/>
    <line x1="-52" y1="30" x2="52" y2="-30"/>
  </g>

  <!-- Top-left geometric corner -->
  <g transform="translate(60, 60)" opacity="0.07" stroke="#C9A84C" stroke-width="0.6" fill="none">
    <polygon points="0,-30 26,-15 26,15 0,30 -26,15 -26,-15"/>
    <circle cx="0" cy="0" r="30"/>
  </g>

  <!-- Top-right geometric corner -->
  <g transform="translate(1140, 60)" opacity="0.07" stroke="#C9A84C" stroke-width="0.6" fill="none">
    <polygon points="0,-30 26,-15 26,15 0,30 -26,15 -26,-15"/>
    <circle cx="0" cy="0" r="30"/>
  </g>

  <!-- Bottom-left geometric corner -->
  <g transform="translate(60, 440)" opacity="0.07" stroke="#C9A84C" stroke-width="0.6" fill="none">
    <polygon points="0,-30 26,-15 26,15 0,30 -26,15 -26,-15"/>
    <circle cx="0" cy="0" r="30"/>
  </g>

  <!-- Bottom-right geometric corner -->
  <g transform="translate(1140, 440)" opacity="0.07" stroke="#C9A84C" stroke-width="0.6" fill="none">
    <polygon points="0,-30 26,-15 26,15 0,30 -26,15 -26,-15"/>
    <circle cx="0" cy="0" r="30"/>
  </g>

  <!-- Connecting lines between geometric elements -->
  <line x1="180" y1="120" x2="420" y2="180" stroke="#C9A84C" stroke-width="0.4" stroke-opacity="0.06"/>
  <line x1="780" y1="180" x2="1020" y2="120" stroke="#C9A84C" stroke-width="0.4" stroke-opacity="0.06"/>
  <line x1="180" y1="380" x2="420" y2="320" stroke="#C9A84C" stroke-width="0.4" stroke-opacity="0.06"/>
  <line x1="780" y1="320" x2="1020" y2="380" stroke="#C9A84C" stroke-width="0.4" stroke-opacity="0.06"/>

  <!-- Scattered small dots -->
  <circle cx="350" cy="100" r="1.5" fill="#C9A84C" fill-opacity="0.12"/>
  <circle cx="850" cy="90" r="1" fill="#C9A84C" fill-opacity="0.1"/>
  <circle cx="300" cy="400" r="1.2" fill="#C9A84C" fill-opacity="0.1"/>
  <circle cx="900" cy="410" r="1.5" fill="#C9A84C" fill-opacity="0.12"/>
</svg>