<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" fill="none">
  <defs>
    <radialGradient id="contactGlow" cx="50%" cy="50%" r="35%">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Central glow -->
  <ellipse cx="600" cy="250" rx="400" ry="250" fill="url(#contactGlow)"/>

  <!-- Namaste hands silhouette (very subtle) -->
  <g transform="translate(600, 240)" opacity="0.07" fill="#C9A84C">
    <!-- Left palm -->
    <path d="M-8 40 Q-12 20 -10 0 Q-9 -15 -7 -30 Q-5 -42 -3 -50 Q-1 -55 0 -55 Q1 -55 2 -50 L2 -30 Q-2 -15 -3 0 Q-4 20 -2 40Z"/>
    <!-- Right palm (mirror) -->
    <path d="M8 40 Q12 20 10 0 Q9 -15 7 -30 Q5 -42 3 -50 Q1 -55 0 -55 Q-1 -55 -2 -50 L-2 -30 Q2 -15 3 0 Q4 20 2 40Z"/>
    <!-- Left fingers -->
    <path d="M-7 -30 Q-9 -45 -8 -60 Q-7 -68 -5 -68 Q-3 -68 -3 -58 Q-4 -45 -3 -30Z" />
    <path d="M-10 -20 Q-14 -38 -13 -55 Q-12 -62 -10 -62 Q-8 -62 -8 -52 Q-9 -38 -7 -20Z"/>
    <path d="M-11 -8 Q-16 -25 -16 -42 Q-15 -50 -13 -50 Q-11 -50 -11 -40 Q-12 -25 -9 -8Z"/>
    <!-- Right fingers (mirror) -->
    <path d="M7 -30 Q9 -45 8 -60 Q7 -68 5 -68 Q3 -68 3 -58 Q4 -45 3 -30Z"/>
    <path d="M10 -20 Q14 -38 13 -55 Q12 -62 10 -62 Q8 -62 8 -52 Q9 -38 7 -20Z"/>
    <path d="M11 -8 Q16 -25 16 -42 Q15 -50 13 -50 Q11 -50 11 -40 Q12 -25 9 -8Z"/>
  </g>

  <!-- Decorative top border -->
  <g opacity="0.1" stroke="#C9A84C" fill="none">
    <!-- Top center ornament -->
    <path d="M540 30 Q560 20 580 30 Q590 35 600 25 Q610 35 620 30 Q640 20 660 30" stroke-width="0.8"/>
    <circle cx="600" cy="18" r="4" stroke-width="0.6"/>
    <line x1="300" y1="30" x2="530" y2="30" stroke-width="0.5" stroke-dasharray="2 6"/>
    <line x1="670" y1="30" x2="900" y2="30" stroke-width="0.5" stroke-dasharray="2 6"/>
    <!-- Small diamonds on the line -->
    <path d="M350 30 L354 26 L358 30 L354 34Z" fill="#C9A84C" fill-opacity="0.5" stroke="none"/>
    <path d="M850 30 L846 26 L842 30 L846 34Z" fill="#C9A84C" fill-opacity="0.5" stroke="none"/>
  </g>

  <!-- Decorative bottom border -->
  <g opacity="0.1" stroke="#C9A84C" fill="none">
    <path d="M540 470 Q560 480 580 470 Q590 465 600 475 Q610 465 620 470 Q640 480 660 470" stroke-width="0.8"/>
    <circle cx="600" cy="482" r="4" stroke-width="0.6"/>
    <line x1="300" y1="470" x2="530" y2="470" stroke-width="0.5" stroke-dasharray="2 6"/>
    <line x1="670" y1="470" x2="900" y2="470" stroke-width="0.5" stroke-dasharray="2 6"/>
    <path d="M350 470 L354 466 L358 470 L354 474Z" fill="#C9A84C" fill-opacity="0.5" stroke="none"/>
    <path d="M850 470 L846 466 L842 470 L846 474Z" fill="#C9A84C" fill-opacity="0.5" stroke="none"/>
  </g>

  <!-- Left decorative border -->
  <g opacity="0.06" stroke="#C9A84C" stroke-width="0.5" fill="none">
    <line x1="40" y1="60" x2="40" y2="440" stroke-dasharray="3 8"/>
    <circle cx="40" cy="150" r="5"/>
    <circle cx="40" cy="250" r="5"/>
    <circle cx="40" cy="350" r="5"/>
  </g>

  <!-- Right decorative border -->
  <g opacity="0.06" stroke="#C9A84C" stroke-width="0.5" fill="none">
    <line x1="1160" y1="60" x2="1160" y2="440" stroke-dasharray="3 8"/>
    <circle cx="1160" cy="150" r="5"/>
    <circle cx="1160" cy="250" r="5"/>
    <circle cx="1160" cy="350" r="5"/>
  </g>

  <!-- Corner ornaments -->
  <g opacity="0.08" stroke="#C9A84C" stroke-width="0.7" fill="none">
    <!-- Top-left corner -->
    <path d="M20 50 L20 20 L50 20"/>
    <path d="M25 45 L25 25 L45 25"/>
    <!-- Top-right corner -->
    <path d="M1180 50 L1180 20 L1150 20"/>
    <path d="M1175 45 L1175 25 L1155 25"/>
    <!-- Bottom-left corner -->
    <path d="M20 450 L20 480 L50 480"/>
    <path d="M25 455 L25 475 L45 475"/>
    <!-- Bottom-right corner -->
    <path d="M1180 450 L1180 480 L1150 480"/>
    <path d="M1175 455 L1175 475 L1155 475"/>
  </g>

  <!-- Scattered small stars -->
  <circle cx="150" cy="120" r="1" fill="#C9A84C" fill-opacity="0.12"/>
  <circle cx="1050" cy="130" r="1.2" fill="#C9A84C" fill-opacity="0.1"/>
  <circle cx="200" cy="380" r="1" fill="#C9A84C" fill-opacity="0.1"/>
  <circle cx="1000" cy="370" r="1.2" fill="#C9A84C" fill-opacity="0.12"/>
</svg>