<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1745"/>
      <stop offset="50%" stop-color="#2E2B59"/>
      <stop offset="100%" stop-color="#3d1f4e"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Stars -->
  <g fill="white" opacity="0.3">
    <circle cx="100" cy="80" r="1.5"/><circle cx="300" cy="150" r="1"/>
    <circle cx="500" cy="60" r="1.5"/><circle cx="700" cy="120" r="1"/>
    <circle cx="900" cy="80" r="1.5"/><circle cx="1100" cy="150" r="1"/>
    <circle cx="200" cy="500" r="1"/><circle cx="400" cy="550" r="1.5"/>
    <circle cx="800" cy="520" r="1"/><circle cx="1000" cy="480" r="1.5"/>
  </g>

  <!-- Brand name -->
  <text x="600" y="200" text-anchor="middle" font-family="serif" font-size="72" font-weight="bold" fill="#C9A84C">
    Believe Astrology
  </text>

  <!-- Tagline -->
  <text x="600" y="280" text-anchor="middle" font-family="serif" font-size="24" fill="#FFFDF0" opacity="0.8">
    Be Better with Connect to Nature
  </text>

  <!-- Divider -->
  <line x1="400" y1="320" x2="800" y2="320" stroke="#C9A84C" stroke-width="1" opacity="0.4"/>

  <!-- Astrologer name -->
  <text x="600" y="380" text-anchor="middle" font-family="serif" font-size="28" fill="#FFFDF0" opacity="0.9">
    Pandit Shree Mahadev Joshi
  </text>

  <!-- Credentials -->
  <text x="600" y="420" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#FF9933" opacity="0.8">
    20+ Years Vedic Astrology &amp; Spiritual Consultation
  </text>

  <!-- Contact -->
  <text x="600" y="520" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#FFFDF0" opacity="0.5">
    +91 8154992727 | mahadevjoshi91@gmail.com
  </text>

  <!-- Border accent -->
  <rect x="20" y="20" width="1160" height="590" rx="4" stroke="#C9A84C" stroke-width="1" fill="none" opacity="0.2"/>
</svg>