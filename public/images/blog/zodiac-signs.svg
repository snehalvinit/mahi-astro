<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <radialGradient id="zs-bg" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#3A3670"/>
      <stop offset="100%" stop-color="#2E2B59"/>
    </radialGradient>
    <radialGradient id="zs-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="450" fill="url(#zs-bg)"/>
  <!-- Star field -->
  <circle cx="80" cy="50" r="1.2" fill="#FFFDF0" opacity="0.5"/>
  <circle cx="720" cy="80" r="1" fill="#FFFDF0" opacity="0.6"/>
  <circle cx="150" cy="380" r="1.5" fill="#FFFDF0" opacity="0.4"/>
  <circle cx="650" cy="370" r="1" fill="#FFFDF0" opacity="0.5"/>
  <circle cx="50" cy="220" r="1.3" fill="#FFFDF0" opacity="0.4"/>
  <circle cx="750" cy="200" r="1.2" fill="#FFFDF0" opacity="0.5"/>
  <!-- Central zodiac wheel -->
  <circle cx="400" cy="210" r="140" fill="url(#zs-glow)"/>
  <circle cx="400" cy="210" r="140" fill="none" stroke="#C9A84C" stroke-width="1.5" opacity="0.5"/>
  <circle cx="400" cy="210" r="120" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.35"/>
  <circle cx="400" cy="210" r="90" fill="none" stroke="#FF9933" stroke-width="0.8" opacity="0.3"/>
  <circle cx="400" cy="210" r="25" fill="#6F4278" opacity="0.5" stroke="#C9A84C" stroke-width="1"/>
  <!-- 12 division lines -->
  <g stroke="#C9A84C" stroke-width="0.8" opacity="0.3">
    <line x1="400" y1="70" x2="400" y2="120"/>
    <line x1="400" y1="300" x2="400" y2="350"/>
    <line x1="260" y1="210" x2="310" y2="210"/>
    <line x1="490" y1="210" x2="540" y2="210"/>
    <line x1="301" y1="111" x2="333" y2="149"/>
    <line x1="467" y1="271" x2="499" y2="309"/>
    <line x1="499" y1="111" x2="467" y2="149"/>
    <line x1="333" y1="271" x2="301" y2="309"/>
    <line x1="270" y1="140" x2="310" y2="161"/>
    <line x1="490" y1="259" x2="530" y2="280"/>
    <line x1="530" y1="140" x2="490" y2="161"/>
    <line x1="310" y1="259" x2="270" y2="280"/>
  </g>
  <!-- 12 zodiac position dots on outer ring -->
  <circle cx="400" cy="70" r="5" fill="#FF9933" opacity="0.8"/>
  <circle cx="470" cy="82" r="4" fill="#C9A84C" opacity="0.7"/>
  <circle cx="525" cy="125" r="4" fill="#FF9933" opacity="0.6"/>
  <circle cx="540" cy="210" r="5" fill="#C9A84C" opacity="0.8"/>
  <circle cx="525" cy="295" r="4" fill="#FF9933" opacity="0.6"/>
  <circle cx="470" cy="338" r="4" fill="#C9A84C" opacity="0.7"/>
  <circle cx="400" cy="350" r="5" fill="#FF9933" opacity="0.8"/>
  <circle cx="330" cy="338" r="4" fill="#C9A84C" opacity="0.7"/>
  <circle cx="275" cy="295" r="4" fill="#FF9933" opacity="0.6"/>
  <circle cx="260" cy="210" r="5" fill="#C9A84C" opacity="0.8"/>
  <circle cx="275" cy="125" r="4" fill="#FF9933" opacity="0.6"/>
  <circle cx="330" cy="82" r="4" fill="#C9A84C" opacity="0.7"/>
  <!-- Constellation dots (Aries-like top right) -->
  <g fill="#FFFDF0" opacity="0.7">
    <circle cx="600" cy="100" r="2.5"/>
    <circle cx="620" cy="85" r="2"/>
    <circle cx="645" cy="90" r="2.5"/>
    <circle cx="660" cy="110" r="2"/>
    <line x1="600" y1="100" x2="620" y2="85" stroke="#FFFDF0" stroke-width="0.8" opacity="0.4"/>
    <line x1="620" y1="85" x2="645" y2="90" stroke="#FFFDF0" stroke-width="0.8" opacity="0.4"/>
    <line x1="645" y1="90" x2="660" y2="110" stroke="#FFFDF0" stroke-width="0.8" opacity="0.4"/>
  </g>
  <!-- Constellation dots (bottom left) -->
  <g fill="#FFFDF0" opacity="0.6">
    <circle cx="120" cy="320" r="2"/>
    <circle cx="140" cy="340" r="2.5"/>
    <circle cx="165" cy="330" r="2"/>
    <circle cx="155" cy="355" r="2"/>
    <line x1="120" y1="320" x2="140" y2="340" stroke="#FFFDF0" stroke-width="0.8" opacity="0.4"/>
    <line x1="140" y1="340" x2="165" y2="330" stroke="#FFFDF0" stroke-width="0.8" opacity="0.4"/>
    <line x1="140" y1="340" x2="155" y2="355" stroke="#FFFDF0" stroke-width="0.8" opacity="0.4"/>
  </g>
  <!-- Decorative border corners -->
  <path d="M30,30 L70,30 M30,30 L30,70" stroke="#C9A84C" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M730,30 L770,30 M770,30 L770,70" stroke="#C9A84C" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M30,420 L70,420 M30,380 L30,420" stroke="#C9A84C" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M730,420 L770,420 M770,380 L770,420" stroke="#C9A84C" stroke-width="1.5" fill="none" opacity="0.5"/>
  <!-- Title -->
  <text x="400" y="420" text-anchor="middle" font-family="Georgia, serif" font-size="32" fill="#C9A84C" font-weight="bold">Zodiac Signs</text>
</svg>