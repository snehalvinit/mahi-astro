<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <radialGradient id="pt-bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#3A3670"/>
      <stop offset="100%" stop-color="#2E2B59"/>
    </radialGradient>
    <radialGradient id="pt-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="450" fill="url(#pt-bg)"/>
  <!-- Star field -->
  <circle cx="120" cy="60" r="1.5" fill="#FFFDF0" opacity="0.6"/>
  <circle cx="680" cy="90" r="1" fill="#FFFDF0" opacity="0.5"/>
  <circle cx="200" cy="380" r="1.2" fill="#FFFDF0" opacity="0.4"/>
  <circle cx="600" cy="350" r="1" fill="#FFFDF0" opacity="0.7"/>
  <circle cx="50" cy="200" r="1.3" fill="#FFFDF0" opacity="0.5"/>
  <circle cx="750" cy="250" r="1" fill="#FFFDF0" opacity="0.6"/>
  <circle cx="350" cy="40" r="1.5" fill="#FFFDF0" opacity="0.4"/>
  <circle cx="500" cy="400" r="1" fill="#FFFDF0" opacity="0.5"/>
  <circle cx="90" cy="310" r="1.2" fill="#FFFDF0" opacity="0.3"/>
  <circle cx="720" cy="170" r="1.4" fill="#FFFDF0" opacity="0.5"/>
  <!-- Central sun glow -->
  <circle cx="400" cy="210" r="100" fill="url(#pt-glow)"/>
  <!-- Orbital paths -->
  <ellipse cx="400" cy="210" rx="70" ry="70" fill="none" stroke="#C9A84C" stroke-width="0.8" opacity="0.3"/>
  <ellipse cx="400" cy="210" rx="120" ry="90" fill="none" stroke="#C9A84C" stroke-width="0.8" opacity="0.25" transform="rotate(-15 400 210)"/>
  <ellipse cx="400" cy="210" rx="170" ry="120" fill="none" stroke="#C9A84C" stroke-width="0.8" opacity="0.2" transform="rotate(10 400 210)"/>
  <!-- Central sun -->
  <circle cx="400" cy="210" r="22" fill="#FF9933" opacity="0.9"/>
  <circle cx="400" cy="210" r="16" fill="#C9A84C"/>
  <!-- Planet 1 -->
  <circle cx="470" cy="200" r="8" fill="#6F4278" stroke="#C9A84C" stroke-width="1.5"/>
  <!-- Planet 2 -->
  <circle cx="310" cy="140" r="12" fill="#FF9933" opacity="0.8"/>
  <circle cx="310" cy="140" r="7" fill="#C9A84C" opacity="0.5"/>
  <!-- Planet 3 with ring -->
  <circle cx="530" cy="280" r="10" fill="#6F4278"/>
  <ellipse cx="530" cy="280" rx="18" ry="5" fill="none" stroke="#C9A84C" stroke-width="1.2" opacity="0.7" transform="rotate(-20 530 280)"/>
  <!-- Planet 4 -->
  <circle cx="260" cy="260" r="6" fill="#C9A84C" opacity="0.7"/>
  <!-- Decorative border corners -->
  <path d="M30,30 L70,30 M30,30 L30,70" stroke="#C9A84C" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M730,30 L770,30 M770,30 L770,70" stroke="#C9A84C" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M30,420 L70,420 M30,380 L30,420" stroke="#C9A84C" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M730,420 L770,420 M770,380 L770,420" stroke="#C9A84C" stroke-width="1.5" fill="none" opacity="0.5"/>
  <!-- Title -->
  <text x="400" y="400" text-anchor="middle" font-family="Georgia, serif" font-size="32" fill="#C9A84C" font-weight="bold">Planetary Transits</text>
</svg>