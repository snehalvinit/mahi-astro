<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <radialGradient id="fm-bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#3A3670"/>
      <stop offset="100%" stop-color="#2E2B59"/>
    </radialGradient>
    <radialGradient id="fm-flame" cx="50%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#FF9933"/>
      <stop offset="60%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="fm-glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF9933" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FF9933" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="450" fill="url(#fm-bg)"/>
  <!-- Sparkle dots -->
  <circle cx="150" cy="80" r="2" fill="#C9A84C" opacity="0.5"/>
  <circle cx="650" cy="60" r="1.5" fill="#FF9933" opacity="0.6"/>
  <circle cx="100" cy="200" r="1.5" fill="#C9A84C" opacity="0.4"/>
  <circle cx="700" cy="180" r="2" fill="#FF9933" opacity="0.5"/>
  <circle cx="250" cy="50" r="1" fill="#FFFDF0" opacity="0.6"/>
  <circle cx="550" cy="45" r="1.2" fill="#FFFDF0" opacity="0.5"/>
  <!-- Central Diya (oil lamp) -->
  <ellipse cx="400" cy="270" rx="50" ry="12" fill="#C9A84C"/>
  <ellipse cx="400" cy="268" rx="45" ry="10" fill="#6F4278"/>
  <path d="M355,270 Q355,310 370,320 L430,320 Q445,310 445,270" fill="#C9A84C"/>
  <ellipse cx="400" cy="320" rx="35" ry="8" fill="#C9A84C"/>
  <!-- Flame -->
  <path d="M400,200 Q415,230 410,255 Q405,268 400,268 Q395,268 390,255 Q385,230 400,200Z" fill="#FF9933"/>
  <path d="M400,220 Q409,240 406,255 Q403,264 400,264 Q397,264 394,255 Q391,240 400,220Z" fill="#FFFDF0" opacity="0.7"/>
  <!-- Glow around flame -->
  <circle cx="400" cy="240" r="60" fill="url(#fm-glow1)"/>
  <!-- Left diya (smaller) -->
  <ellipse cx="180" cy="290" rx="30" ry="7" fill="#C9A84C" opacity="0.7"/>
  <path d="M155,290 Q155,315 165,320 L195,320 Q205,315 205,290" fill="#C9A84C" opacity="0.7"/>
  <path d="M180,240 Q190,260 186,280 Q183,288 180,288 Q177,288 174,280 Q170,260 180,240Z" fill="#FF9933" opacity="0.8"/>
  <!-- Right diya (smaller) -->
  <ellipse cx="620" cy="290" rx="30" ry="7" fill="#C9A84C" opacity="0.7"/>
  <path d="M595,290 Q595,315 605,320 L635,320 Q645,315 645,290" fill="#C9A84C" opacity="0.7"/>
  <path d="M620,240 Q630,260 626,280 Q623,288 620,288 Q617,288 614,280 Q610,260 620,240Z" fill="#FF9933" opacity="0.8"/>
  <!-- Rangoli pattern (simplified) -->
  <circle cx="400" cy="380" r="25" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.3"/>
  <circle cx="400" cy="380" r="18" fill="none" stroke="#FF9933" stroke-width="1" opacity="0.3"/>
  <circle cx="400" cy="380" r="10" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.3"/>
  <!-- Petal shapes around rangoli -->
  <ellipse cx="400" cy="350" rx="5" ry="10" fill="#FF9933" opacity="0.2"/>
  <ellipse cx="400" cy="410" rx="5" ry="10" fill="#FF9933" opacity="0.2"/>
  <ellipse cx="370" cy="380" rx="10" ry="5" fill="#FF9933" opacity="0.2"/>
  <ellipse cx="430" cy="380" rx="10" ry="5" fill="#FF9933" opacity="0.2"/>
  <!-- Decorative arches top -->
  <path d="M200,0 Q250,40 300,0" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.3"/>
  <path d="M300,0 Q350,40 400,0" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.3"/>
  <path d="M400,0 Q450,40 500,0" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.3"/>
  <path d="M500,0 Q550,40 600,0" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.3"/>
  <!-- Decorative border corners -->
  <path d="M30,30 L70,30 M30,30 L30,70" stroke="#C9A84C" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M730,30 L770,30 M770,30 L770,70" stroke="#C9A84C" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M30,420 L70,420 M30,380 L30,420" stroke="#C9A84C" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M730,420 L770,420 M770,380 L770,420" stroke="#C9A84C" stroke-width="1.5" fill="none" opacity="0.5"/>
  <!-- Title -->
  <text x="400" y="160" text-anchor="middle" font-family="Georgia, serif" font-size="32" fill="#C9A84C" font-weight="bold">Festivals &amp; Muhurat</text>
</svg>