<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" fill="none">
  <!-- Background circle -->
  <circle cx="300" cy="320" r="260" fill="#2E2B59" opacity="0.05"/>

  <!-- Person silhouette -->
  <g transform="translate(300, 280)">
    <!-- Head -->
    <circle cx="0" cy="-80" r="70" stroke="#C9A84C" stroke-width="2" fill="#2E2B59" opacity="0.1"/>
    <!-- Tilak mark on forehead -->
    <ellipse cx="0" cy="-100" rx="4" ry="12" fill="#C9A84C" opacity="0.6"/>

    <!-- Body/shoulders -->
    <path d="M-100 40 Q-100 -20 -60 -30 Q-20 -40 0 -20 Q20 -40 60 -30 Q100 -20 100 40 L100 120 Q100 140 80 140 L-80 140 Q-100 140 -100 120 Z"
          stroke="#C9A84C" stroke-width="2" fill="#2E2B59" opacity="0.08"/>

    <!-- Shawl/uttariya -->
    <path d="M-80 -10 Q-60 20 -40 30 Q0 50 40 30 Q60 20 80 -10"
          stroke="#C9A84C" stroke-width="1.5" fill="none" opacity="0.4"/>

    <!-- Mala/necklace -->
    <ellipse cx="0" cy="10" rx="35" ry="25" stroke="#C9A84C" stroke-width="1" fill="none" opacity="0.3"/>
    <circle cx="0" cy="35" r="5" fill="#C9A84C" opacity="0.3"/>
  </g>

  <!-- Om symbol below -->
  <g transform="translate(300, 520) scale(0.6)" opacity="0.15">
    <path d="M-30 20 C-30 -10 -15 -25 5 -25 C25 -25 30 -10 20 5 C10 20 -5 30 -20 35 M20 5 C35 -5 45 -20 40 -35 C35 -50 20 -55 5 -50 M5 -50 C-5 -48 -10 -40 -8 -32 M40 -35 C50 -35 55 -40 55 -48 C55 -56 48 -60 42 -55"
          stroke="#C9A84C" stroke-width="4" fill="none" stroke-linecap="round"/>
    <circle cx="42" cy="-65" r="3" fill="#C9A84C"/>
  </g>

  <!-- Decorative border corners -->
  <g stroke="#C9A84C" stroke-width="1.5" fill="none" opacity="0.2">
    <!-- Top-left -->
    <path d="M30 30 L30 60 M30 30 L60 30"/>
    <path d="M30 30 Q30 30 40 40" stroke-width="1"/>
    <!-- Top-right -->
    <path d="M570 30 L570 60 M570 30 L540 30"/>
    <!-- Bottom-left -->
    <path d="M30 770 L30 740 M30 770 L60 770"/>
    <!-- Bottom-right -->
    <path d="M570 770 L570 740 M570 770 L540 770"/>
  </g>

  <!-- Name text area indicator -->
  <text x="300" y="680" text-anchor="middle" font-family="serif" font-size="18" fill="#C9A84C" opacity="0.4">
    Pandit Shree Mahadev Joshi
  </text>
  <text x="300" y="710" text-anchor="middle" font-family="serif" font-size="13" fill="#6F4278" opacity="0.3">
    Vedic Astrologer &amp; Spiritual Guide
  </text>
</svg>