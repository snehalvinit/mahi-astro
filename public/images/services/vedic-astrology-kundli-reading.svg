<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" fill="none">
  <!-- Birth chart: circle divided into 12 houses -->
  <circle cx="600" cy="250" r="180" stroke="#C9A84C" stroke-width="1.5" opacity="0.15"/>
  <circle cx="600" cy="250" r="120" stroke="#6F4278" stroke-width="1" opacity="0.12"/>
  <circle cx="600" cy="250" r="60" stroke="#2E2B59" stroke-width="0.8" opacity="0.1"/>
  <!-- 12 house division lines -->
  <line x1="600" y1="70" x2="600" y2="430" stroke="#C9A84C" stroke-width="0.8" opacity="0.12"/>
  <line x1="420" y1="250" x2="780" y2="250" stroke="#C9A84C" stroke-width="0.8" opacity="0.12"/>
  <line x1="473" y1="123" x2="727" y2="377" stroke="#6F4278" stroke-width="0.8" opacity="0.1"/>
  <line x1="727" y1="123" x2="473" y2="377" stroke="#6F4278" stroke-width="0.8" opacity="0.1"/>
  <line x1="510" y1="94" x2="690" y2="406" stroke="#2E2B59" stroke-width="0.6" opacity="0.08"/>
  <line x1="690" y1="94" x2="510" y2="406" stroke="#2E2B59" stroke-width="0.6" opacity="0.08"/>
  <!-- Diamond inscribed -->
  <polygon points="600,70 780,250 600,430 420,250" stroke="#C9A84C" stroke-width="1" opacity="0.1" fill="none"/>
  <!-- Small decorative dots at intersections -->
  <circle cx="600" cy="70" r="3" fill="#C9A84C" opacity="0.15"/>
  <circle cx="780" cy="250" r="3" fill="#C9A84C" opacity="0.15"/>
  <circle cx="600" cy="430" r="3" fill="#C9A84C" opacity="0.15"/>
  <circle cx="420" cy="250" r="3" fill="#C9A84C" opacity="0.15"/>
  <!-- Scattered small stars -->
  <circle cx="150" cy="100" r="2" fill="#C9A84C" opacity="0.12"/>
  <circle cx="1050" cy="80" r="2" fill="#6F4278" opacity="0.1"/>
  <circle cx="200" cy="380" r="1.5" fill="#2E2B59" opacity="0.1"/>
  <circle cx="1000" cy="400" r="2" fill="#C9A84C" opacity="0.1"/>
  <circle cx="100" cy="250" r="1.5" fill="#6F4278" opacity="0.08"/>
  <circle cx="1100" cy="250" r="1.5" fill="#C9A84C" opacity="0.08"/>
</svg>