<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" fill="none">
  <!-- Constellation pattern: connected dots forming star patterns -->
  <!-- Constellation group 1 -->
  <circle cx="200" cy="120" r="3" fill="#C9A84C" opacity="0.2"/>
  <circle cx="280" cy="90" r="2.5" fill="#C9A84C" opacity="0.18"/>
  <circle cx="320" cy="160" r="3" fill="#C9A84C" opacity="0.2"/>
  <circle cx="250" cy="200" r="2" fill="#C9A84C" opacity="0.15"/>
  <circle cx="180" cy="180" r="2.5" fill="#C9A84C" opacity="0.18"/>
  <line x1="200" y1="120" x2="280" y2="90" stroke="#C9A84C" stroke-width="0.8" opacity="0.12"/>
  <line x1="280" y1="90" x2="320" y2="160" stroke="#C9A84C" stroke-width="0.8" opacity="0.12"/>
  <line x1="320" y1="160" x2="250" y2="200" stroke="#C9A84C" stroke-width="0.8" opacity="0.12"/>
  <line x1="250" y1="200" x2="180" y2="180" stroke="#C9A84C" stroke-width="0.8" opacity="0.12"/>
  <line x1="180" y1="180" x2="200" y2="120" stroke="#C9A84C" stroke-width="0.8" opacity="0.12"/>
  <!-- Constellation group 2 -->
  <circle cx="550" cy="180" r="3.5" fill="#6F4278" opacity="0.18"/>
  <circle cx="620" cy="130" r="3" fill="#6F4278" opacity="0.2"/>
  <circle cx="700" cy="150" r="2.5" fill="#6F4278" opacity="0.15"/>
  <circle cx="680" cy="230" r="3" fill="#6F4278" opacity="0.18"/>
  <circle cx="590" cy="260" r="2" fill="#6F4278" opacity="0.15"/>
  <circle cx="640" cy="200" r="4" fill="#6F4278" opacity="0.12"/>
  <line x1="550" y1="180" x2="620" y2="130" stroke="#6F4278" stroke-width="0.8" opacity="0.1"/>
  <line x1="620" y1="130" x2="700" y2="150" stroke="#6F4278" stroke-width="0.8" opacity="0.1"/>
  <line x1="700" y1="150" x2="680" y2="230" stroke="#6F4278" stroke-width="0.8" opacity="0.1"/>
  <line x1="680" y1="230" x2="590" y2="260" stroke="#6F4278" stroke-width="0.8" opacity="0.1"/>
  <line x1="590" y1="260" x2="640" y2="200" stroke="#6F4278" stroke-width="0.8" opacity="0.1"/>
  <line x1="640" y1="200" x2="550" y2="180" stroke="#6F4278" stroke-width="0.8" opacity="0.1"/>
  <!-- Constellation group 3 -->
  <circle cx="900" cy="280" r="3" fill="#2E2B59" opacity="0.18"/>
  <circle cx="970" cy="240" r="2.5" fill="#2E2B59" opacity="0.15"/>
  <circle cx="1040" cy="280" r="3" fill="#2E2B59" opacity="0.18"/>
  <circle cx="1020" cy="350" r="2" fill="#2E2B59" opacity="0.15"/>
  <circle cx="940" cy="360" r="3" fill="#2E2B59" opacity="0.2"/>
  <line x1="900" y1="280" x2="970" y2="240" stroke="#2E2B59" stroke-width="0.8" opacity="0.1"/>
  <line x1="970" y1="240" x2="1040" y2="280" stroke="#2E2B59" stroke-width="0.8" opacity="0.1"/>
  <line x1="1040" y1="280" x2="1020" y2="350" stroke="#2E2B59" stroke-width="0.8" opacity="0.1"/>
  <line x1="1020" y1="350" x2="940" y2="360" stroke="#2E2B59" stroke-width="0.8" opacity="0.1"/>
  <line x1="940" y1="360" x2="900" y2="280" stroke="#2E2B59" stroke-width="0.8" opacity="0.1"/>
  <!-- Scattered single stars -->
  <circle cx="100" cy="350" r="1.5" fill="#C9A84C" opacity="0.1"/>
  <circle cx="450" cy="400" r="2" fill="#6F4278" opacity="0.08"/>
  <circle cx="800" cy="100" r="1.5" fill="#C9A84C" opacity="0.1"/>
  <circle cx="1100" cy="150" r="2" fill="#2E2B59" opacity="0.08"/>
  <circle cx="350" cy="350" r="1.5" fill="#C9A84C" opacity="0.08"/>
  <circle cx="750" cy="400" r="1.5" fill="#6F4278" opacity="0.1"/>
</svg>