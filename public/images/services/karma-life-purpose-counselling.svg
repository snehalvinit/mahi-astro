<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" fill="none">
  <!-- Lotus flower with infinity loop -->
  <!-- Lotus petals -->
  <g transform="translate(600,260)" opacity="0.15">
    <!-- Center petal up -->
    <ellipse cx="0" cy="-45" rx="18" ry="40" stroke="#C9A84C" stroke-width="1" fill="none"/>
    <!-- Left petals -->
    <ellipse cx="-35" cy="-30" rx="16" ry="38" stroke="#C9A84C" stroke-width="0.8" fill="none" transform="rotate(-30 -35 -30)"/>
    <ellipse cx="-55" cy="-5" rx="14" ry="35" stroke="#6F4278" stroke-width="0.8" fill="none" transform="rotate(-60 -55 -5)"/>
    <!-- Right petals -->
    <ellipse cx="35" cy="-30" rx="16" ry="38" stroke="#C9A84C" stroke-width="0.8" fill="none" transform="rotate(30 35 -30)"/>
    <ellipse cx="55" cy="-5" rx="14" ry="35" stroke="#6F4278" stroke-width="0.8" fill="none" transform="rotate(60 55 -5)"/>
    <!-- Outer left petal -->
    <ellipse cx="-65" cy="15" rx="12" ry="30" stroke="#2E2B59" stroke-width="0.6" fill="none" transform="rotate(-80 -65 15)"/>
    <!-- Outer right petal -->
    <ellipse cx="65" cy="15" rx="12" ry="30" stroke="#2E2B59" stroke-width="0.6" fill="none" transform="rotate(80 65 15)"/>
    <!-- Center circle -->
    <circle cx="0" cy="-10" r="8" fill="#C9A84C" opacity="0.3"/>
  </g>
  <!-- Infinity loop around/below lotus -->
  <path d="M480,300 C480,260 540,230 600,270 C660,230 720,260 720,300 C720,340 660,370 600,330 C540,370 480,340 480,300 Z" stroke="#6F4278" stroke-width="1.2" opacity="0.12" fill="none"/>
  <!-- Second larger infinity loop -->
  <path d="M440,300 C440,240 510,200 600,270 C690,200 760,240 760,300 C760,360 690,400 600,330 C510,400 440,360 440,300 Z" stroke="#C9A84C" stroke-width="0.8" opacity="0.08" fill="none"/>
  <!-- Decorative dots -->
  <circle cx="200" cy="150" r="2" fill="#C9A84C" opacity="0.1"/>
  <circle cx="1000" cy="130" r="2" fill="#6F4278" opacity="0.08"/>
  <circle cx="150" cy="350" r="1.5" fill="#2E2B59" opacity="0.08"/>
  <circle cx="1050" cy="370" r="1.5" fill="#C9A84C" opacity="0.08"/>
  <circle cx="350" cy="100" r="1.5" fill="#6F4278" opacity="0.1"/>
  <circle cx="850" cy="420" r="2" fill="#2E2B59" opacity="0.08"/>
</svg>