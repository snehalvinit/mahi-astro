<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" fill="none">
  <!-- Diya/oil lamp shapes with flame -->
  <!-- Central large diya -->
  <g transform="translate(600,280)" opacity="0.15">
    <!-- Lamp base -->
    <ellipse cx="0" cy="30" rx="50" ry="12" stroke="#C9A84C" stroke-width="1.2" fill="none"/>
    <!-- Lamp body -->
    <path d="M-50,30 Q-45,0 -30,-15 L30,-15 Q45,0 50,30" stroke="#C9A84C" stroke-width="1.2" fill="none"/>
    <!-- Oil surface -->
    <ellipse cx="0" cy="-15" rx="30" ry="6" stroke="#C9A84C" stroke-width="0.6" fill="none"/>
    <!-- Flame -->
    <path d="M0,-15 Q-12,-50 0,-80 Q12,-50 0,-15" stroke="#C9A84C" stroke-width="1" fill="#C9A84C" fill-opacity="0.1"/>
    <!-- Inner flame -->
    <path d="M0,-20 Q-6,-45 0,-65 Q6,-45 0,-20" stroke="#6F4278" stroke-width="0.6" fill="none"/>
    <!-- Flame glow -->
    <circle cx="0" cy="-50" r="20" fill="#C9A84C" opacity="0.06"/>
  </g>
  <!-- Left small diya -->
  <g transform="translate(300,320) scale(0.6)" opacity="0.1">
    <ellipse cx="0" cy="30" rx="50" ry="12" stroke="#6F4278" stroke-width="1.2" fill="none"/>
    <path d="M-50,30 Q-45,0 -30,-15 L30,-15 Q45,0 50,30" stroke="#6F4278" stroke-width="1.2" fill="none"/>
    <path d="M0,-15 Q-10,-45 0,-70 Q10,-45 0,-15" stroke="#6F4278" stroke-width="0.8" fill="#6F4278" fill-opacity="0.08"/>
  </g>
  <!-- Right small diya -->
  <g transform="translate(900,320) scale(0.6)" opacity="0.1">
    <ellipse cx="0" cy="30" rx="50" ry="12" stroke="#6F4278" stroke-width="1.2" fill="none"/>
    <path d="M-50,30 Q-45,0 -30,-15 L30,-15 Q45,0 50,30" stroke="#6F4278" stroke-width="1.2" fill="none"/>
    <path d="M0,-15 Q-10,-45 0,-70 Q10,-45 0,-15" stroke="#6F4278" stroke-width="0.8" fill="#6F4278" fill-opacity="0.08"/>
  </g>
  <!-- Light rays from center lamp -->
  <line x1="600" y1="180" x2="580" y2="100" stroke="#C9A84C" stroke-width="0.4" opacity="0.08"/>
  <line x1="600" y1="180" x2="620" y2="100" stroke="#C9A84C" stroke-width="0.4" opacity="0.08"/>
  <line x1="600" y1="180" x2="550" y2="120" stroke="#C9A84C" stroke-width="0.3" opacity="0.06"/>
  <line x1="600" y1="180" x2="650" y2="120" stroke="#C9A84C" stroke-width="0.3" opacity="0.06"/>
  <!-- Small decorative dots (light particles) -->
  <circle cx="570" cy="140" r="1.5" fill="#C9A84C" opacity="0.12"/>
  <circle cx="630" cy="130" r="1" fill="#C9A84C" opacity="0.1"/>
  <circle cx="590" cy="110" r="1" fill="#6F4278" opacity="0.08"/>
  <circle cx="615" cy="150" r="1.5" fill="#C9A84C" opacity="0.1"/>
</svg>