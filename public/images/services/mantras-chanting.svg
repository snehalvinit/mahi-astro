<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" fill="none">
  <!-- Om symbol with radiating sound waves -->
  <!-- Om symbol (simplified geometric) -->
  <g transform="translate(600,240)" opacity="0.15">
    <!-- Main Om body -->
    <path d="M-30,30 Q-40,10 -30,-10 Q-20,-30 0,-30 Q20,-30 25,-15 Q30,0 20,15 Q10,25 -5,25" stroke="#C9A84C" stroke-width="2" fill="none"/>
    <!-- Upper curve -->
    <path d="M-5,25 Q5,20 15,10 Q25,-5 35,-15 Q40,-25 35,-35 Q28,-45 15,-40" stroke="#C9A84C" stroke-width="2" fill="none"/>
    <!-- Top hook -->
    <path d="M15,-40 Q20,-50 10,-55 Q0,-55 -5,-48" stroke="#C9A84C" stroke-width="2" fill="none"/>
    <!-- Chandrabindu (crescent + dot) -->
    <path d="M5,-60 Q15,-68 25,-60" stroke="#C9A84C" stroke-width="1.5" fill="none"/>
    <circle cx="15" cy="-75" r="4" fill="#C9A84C" opacity="0.8"/>
    <!-- Lower tail -->
    <path d="M-30,30 Q-35,40 -25,48 Q-15,52 -5,45" stroke="#C9A84C" stroke-width="2" fill="none"/>
  </g>
  <!-- Radiating sound waves (concentric arcs) -->
  <!-- Right side waves -->
  <path d="M680,240 Q700,200 680,160" stroke="#6F4278" stroke-width="1" opacity="0.1" fill="none"/>
  <path d="M710,260 Q740,200 710,140" stroke="#6F4278" stroke-width="0.8" opacity="0.08" fill="none"/>
  <path d="M740,280 Q780,200 740,120" stroke="#2E2B59" stroke-width="0.6" opacity="0.06" fill="none"/>
  <path d="M770,300 Q820,200 770,100" stroke="#2E2B59" stroke-width="0.5" opacity="0.05" fill="none"/>
  <!-- Left side waves -->
  <path d="M520,240 Q500,200 520,160" stroke="#6F4278" stroke-width="1" opacity="0.1" fill="none"/>
  <path d="M490,260 Q460,200 490,140" stroke="#6F4278" stroke-width="0.8" opacity="0.08" fill="none"/>
  <path d="M460,280 Q420,200 460,120" stroke="#2E2B59" stroke-width="0.6" opacity="0.06" fill="none"/>
  <path d="M430,300 Q380,200 430,100" stroke="#2E2B59" stroke-width="0.5" opacity="0.05" fill="none"/>
  <!-- Top waves -->
  <path d="M570,140 Q600,120 630,140" stroke="#C9A84C" stroke-width="0.8" opacity="0.08" fill="none"/>
  <path d="M555,115 Q600,90 645,115" stroke="#C9A84C" stroke-width="0.6" opacity="0.06" fill="none"/>
  <path d="M540,90 Q600,60 660,90" stroke="#C9A84C" stroke-width="0.5" opacity="0.05" fill="none"/>
  <!-- Bottom waves -->
  <path d="M565,340 Q600,360 635,340" stroke="#C9A84C" stroke-width="0.8" opacity="0.08" fill="none"/>
  <path d="M550,365 Q600,390 650,365" stroke="#C9A84C" stroke-width="0.6" opacity="0.06" fill="none"/>
  <!-- Vibration dots -->
  <circle cx="820" cy="200" r="1.5" fill="#C9A84C" opacity="0.08"/>
  <circle cx="380" cy="210" r="1.5" fill="#C9A84C" opacity="0.08"/>
  <circle cx="850" cy="240" r="1" fill="#6F4278" opacity="0.06"/>
  <circle cx="350" cy="230" r="1" fill="#6F4278" opacity="0.06"/>
  <!-- Mala beads suggestion (subtle arc of dots) -->
  <circle cx="200" cy="400" r="2" fill="#2E2B59" opacity="0.06"/>
  <circle cx="215" cy="395" r="2" fill="#2E2B59" opacity="0.06"/>
  <circle cx="230" cy="392" r="2" fill="#2E2B59" opacity="0.06"/>
  <circle cx="245" cy="390" r="2" fill="#2E2B59" opacity="0.06"/>
  <circle cx="260" cy="389" r="2" fill="#2E2B59" opacity="0.06"/>
</svg>