<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" fill="none">
  <!-- Vastu directional 3x3 grid -->
  <!-- Main grid -->
  <rect x="450" y="100" width="300" height="300" stroke="#C9A84C" stroke-width="1.2" opacity="0.15" rx="2"/>
  <!-- Vertical grid lines -->
  <line x1="550" y1="100" x2="550" y2="400" stroke="#C9A84C" stroke-width="0.8" opacity="0.12"/>
  <line x1="650" y1="100" x2="650" y2="400" stroke="#C9A84C" stroke-width="0.8" opacity="0.12"/>
  <!-- Horizontal grid lines -->
  <line x1="450" y1="200" x2="750" y2="200" stroke="#C9A84C" stroke-width="0.8" opacity="0.12"/>
  <line x1="450" y1="300" x2="750" y2="300" stroke="#C9A84C" stroke-width="0.8" opacity="0.12"/>
  <!-- Cardinal direction indicators -->
  <!-- N -->
  <line x1="600" y1="100" x2="600" y2="60" stroke="#6F4278" stroke-width="1" opacity="0.15"/>
  <polygon points="600,50 594,65 606,65" fill="#6F4278" opacity="0.15"/>
  <!-- S -->
  <line x1="600" y1="400" x2="600" y2="440" stroke="#6F4278" stroke-width="1" opacity="0.12"/>
  <polygon points="600,450 594,435 606,435" fill="#6F4278" opacity="0.12"/>
  <!-- E -->
  <line x1="750" y1="250" x2="790" y2="250" stroke="#6F4278" stroke-width="1" opacity="0.12"/>
  <polygon points="800,250 785,244 785,256" fill="#6F4278" opacity="0.12"/>
  <!-- W -->
  <line x1="450" y1="250" x2="410" y2="250" stroke="#6F4278" stroke-width="1" opacity="0.12"/>
  <polygon points="400,250 415,244 415,256" fill="#6F4278" opacity="0.12"/>
  <!-- Diagonal lines through center -->
  <line x1="450" y1="100" x2="750" y2="400" stroke="#2E2B59" stroke-width="0.5" opacity="0.08"/>
  <line x1="750" y1="100" x2="450" y2="400" stroke="#2E2B59" stroke-width="0.5" opacity="0.08"/>
  <!-- Center point (Brahmasthan) -->
  <circle cx="600" cy="250" r="15" stroke="#C9A84C" stroke-width="0.8" opacity="0.12"/>
  <circle cx="600" cy="250" r="3" fill="#C9A84C" opacity="0.15"/>
  <!-- Corner element markers -->
  <circle cx="450" cy="100" r="4" fill="#2E2B59" opacity="0.08"/>
  <circle cx="750" cy="100" r="4" fill="#2E2B59" opacity="0.08"/>
  <circle cx="450" cy="400" r="4" fill="#2E2B59" opacity="0.08"/>
  <circle cx="750" cy="400" r="4" fill="#2E2B59" opacity="0.08"/>
  <!-- Decorative outer elements -->
  <rect x="430" y="80" width="340" height="340" stroke="#2E2B59" stroke-width="0.5" opacity="0.06" rx="4" stroke-dasharray="6,4"/>
</svg>