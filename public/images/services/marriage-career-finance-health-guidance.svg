<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" fill="none">
  <!-- Compass rose with paths -->
  <!-- Outer compass circle -->
  <circle cx="600" cy="250" r="150" stroke="#C9A84C" stroke-width="1" opacity="0.12"/>
  <circle cx="600" cy="250" r="100" stroke="#6F4278" stroke-width="0.8" opacity="0.1"/>
  <!-- Compass rose points (N, S, E, W) -->
  <polygon points="600,100 615,220 600,200 585,220" fill="#C9A84C" opacity="0.15"/>
  <polygon points="600,400 615,280 600,300 585,280" fill="#C9A84C" opacity="0.1"/>
  <polygon points="750,250 630,235 650,250 630,265" fill="#6F4278" opacity="0.12"/>
  <polygon points="450,250 570,235 550,250 570,265" fill="#6F4278" opacity="0.12"/>
  <!-- Diagonal points (NE, NW, SE, SW) -->
  <polygon points="706,144 625,230 640,225 630,240" fill="#2E2B59" opacity="0.1"/>
  <polygon points="494,144 575,230 560,225 570,240" fill="#2E2B59" opacity="0.1"/>
  <polygon points="706,356 625,270 640,275 630,260" fill="#2E2B59" opacity="0.1"/>
  <polygon points="494,356 575,270 560,275 570,260" fill="#2E2B59" opacity="0.1"/>
  <!-- Center dot -->
  <circle cx="600" cy="250" r="4" fill="#C9A84C" opacity="0.18"/>
  <!-- Crossroads/paths extending outward -->
  <line x1="600" y1="100" x2="600" y2="30" stroke="#C9A84C" stroke-width="1" opacity="0.08" stroke-dasharray="4,4"/>
  <line x1="600" y1="400" x2="600" y2="470" stroke="#C9A84C" stroke-width="1" opacity="0.08" stroke-dasharray="4,4"/>
  <line x1="750" y1="250" x2="850" y2="250" stroke="#6F4278" stroke-width="1" opacity="0.08" stroke-dasharray="4,4"/>
  <line x1="450" y1="250" x2="350" y2="250" stroke="#6F4278" stroke-width="1" opacity="0.08" stroke-dasharray="4,4"/>
  <!-- Curved paths -->
  <path d="M200,420 Q350,300 450,250" stroke="#C9A84C" stroke-width="0.8" opacity="0.08" stroke-dasharray="3,3"/>
  <path d="M1000,80 Q850,200 750,250" stroke="#6F4278" stroke-width="0.8" opacity="0.08" stroke-dasharray="3,3"/>
  <!-- Small tick marks around compass -->
  <line x1="600" y1="102" x2="600" y2="110" stroke="#C9A84C" stroke-width="0.5" opacity="0.1"/>
  <line x1="600" y1="390" x2="600" y2="398" stroke="#C9A84C" stroke-width="0.5" opacity="0.1"/>
  <line x1="748" y1="250" x2="752" y2="250" stroke="#C9A84C" stroke-width="0.5" opacity="0.1"/>
  <line x1="448" y1="250" x2="452" y2="250" stroke="#C9A84C" stroke-width="0.5" opacity="0.1"/>
</svg>