<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" fill="none">
  <!-- Trishul (trident) symbol of Lord Shiva -->
  <g transform="translate(600,250)" opacity="0.15">
    <!-- Central shaft -->
    <line x1="0" y1="-180" x2="0" y2="200" stroke="#C9A84C" stroke-width="2" />
    <!-- Center prong (tallest) -->
    <path d="M0,-180 Q-8,-160 -6,-130 L0,-120 L6,-130 Q8,-160 0,-180" stroke="#C9A84C" stroke-width="1.2" fill="#C9A84C" fill-opacity="0.08"/>
    <!-- Left prong -->
    <path d="M-60,-120 Q-55,-105 -40,-80 Q-25,-65 -15,-50 L-8,-55 Q-20,-70 -35,-90 Q-48,-108 -60,-120" stroke="#C9A84C" stroke-width="1.2" fill="none"/>
    <path d="M-60,-120 Q-65,-110 -55,-95" stroke="#C9A84C" stroke-width="1" fill="none"/>
    <!-- Right prong -->
    <path d="M60,-120 Q55,-105 40,-80 Q25,-65 15,-50 L8,-55 Q20,-70 35,-90 Q48,-108 60,-120" stroke="#C9A84C" stroke-width="1.2" fill="none"/>
    <path d="M60,-120 Q65,-110 55,-95" stroke="#C9A84C" stroke-width="1" fill="none"/>
    <!-- Connecting arc between prongs -->
    <path d="M-15,-50 Q0,-65 15,-50" stroke="#C9A84C" stroke-width="1" fill="none"/>
    <!-- Damaru (drum) shape on shaft -->
    <ellipse cx="0" cy="-30" rx="12" ry="8" stroke="#6F4278" stroke-width="0.8" fill="none"/>
    <ellipse cx="0" cy="-10" rx="12" ry="8" stroke="#6F4278" stroke-width="0.8" fill="none"/>
    <line x1="-6" y1="-25" x2="-6" y2="-15" stroke="#6F4278" stroke-width="0.5"/>
    <line x1="6" y1="-25" x2="6" y2="-15" stroke="#6F4278" stroke-width="0.5"/>
  </g>
  <!-- Third eye dot -->
  <circle cx="600" cy="95" r="5" fill="#C9A84C" opacity="0.12"/>
  <!-- Crescent moon -->
  <path d="M585,80 Q595,70 610,78 Q598,72 585,80" stroke="#6F4278" stroke-width="0.8" opacity="0.12" fill="#6F4278" fill-opacity="0.05"/>
  <!-- Subtle energy circles radiating from trishul -->
  <circle cx="600" cy="100" r="80" stroke="#2E2B59" stroke-width="0.5" opacity="0.06" fill="none"/>
  <circle cx="600" cy="100" r="120" stroke="#6F4278" stroke-width="0.4" opacity="0.04" fill="none"/>
  <!-- Ash/vibhuti lines -->
  <line x1="550" y1="460" x2="650" y2="460" stroke="#2E2B59" stroke-width="1" opacity="0.06"/>
  <line x1="555" y1="468" x2="645" y2="468" stroke="#2E2B59" stroke-width="1" opacity="0.06"/>
  <line x1="560" y1="476" x2="640" y2="476" stroke="#2E2B59" stroke-width="1" opacity="0.06"/>
</svg>